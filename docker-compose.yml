version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models      # persist trained models
      - ./data:/app/data          # persist processed data
      - ./results:/app/results    # persist metrics
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitor:
    image: python:3.11-slim
    command: python /app/monitoring/monitor.py
    volumes:
      - ./monitoring:/app/monitoring
    environment:
      - API_URL=http://api:8000
      - MONITOR_INTERVAL=30
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
